apiVersion: apps/v1
kind: Deployment
metadata:
  name: idukvrachu-backend
  labels:
    app: idukvrachu
    component: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: idukvrachu
      component: backend
  template:
    metadata:
      labels:
        app: idukvrachu
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/dustdev/idukvrachu-backend:latest
          imagePullPolicy: Always
          command: ["uvicorn", "backend.app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: idukvrachu-config
            - secretRef:
                name: idukvrachu-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: idukvrachu-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: idukvrachu-bot
  labels:
    app: idukvrachu
    component: bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: idukvrachu
      component: bot
  template:
    metadata:
      labels:
        app: idukvrachu
        component: bot
    spec:
      containers:
        - name: bot
          image: ghcr.io/dustdev/idukvrachu-backend:latest
          imagePullPolicy: Always
          command: ["python", "-m", "bot.main"]
          envFrom:
            - configMapRef:
                name: idukvrachu-config
            - secretRef:
                name: idukvrachu-secrets
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: idukvrachu-data
