services:
  backend:
    build: .
    container_name: idukvrachu_backend
    volumes:
      - .:/app
      - db_data:/app/data
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - app_network

  bot:
    build: .
    container_name: idukvrachu_bot
    volumes:
      - .:/app
    env_file:
      - .env
    command: python -m bot.main
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  db_data:
